title: Suspicious PowerShell Execution
id: 12345678-abcd-1234-abcd-123456789abc
status: test
description: Detects suspicious PowerShell execution patterns
author: Adrian
date: 2026/02/16
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: 
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Invoke-'
      - 'iex'
      - 'DownloadString'
      - 'WebClient'
  condition: selection
falsepositives:
  - Legitimate administrative scripts
level: high
tags:
  - attack.execution
  - attack.t1059.001
