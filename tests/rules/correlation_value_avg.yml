title: Suspicious Average Network Traffic
id: 0e95725d-7320-415d-80f7-004da920fc16
description: Detects suspicious average network traffic patterns that may indicate data exfiltration
status: test
author: Sigma Correlation Test
date: 2025-12-03
logsource:
    category: network_traffic
    product: firewall
detection:
    selection:
        action: allowed
        direction: outbound
    condition: selection
# Correlation metadata for value_avg
correlation:
    type: value_avg
    group-by:
        - SourceIP
        - User
    timespan: 24h
    condition:
        field: BytesOut
        gt: 500000
