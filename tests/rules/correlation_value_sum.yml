title: Possible Data Exfiltration to Website
id: 0e95725d-7320-415d-80f7-004da920fc15
description: Detects possible data exfiltration by summing bytes sent to external websites
status: test
author: Sigma Correlation Test
date: 2025-12-03
logsource:
    category: network_traffic
    product: firewall
detection:
    selection:
        action: allowed
        direction: outbound
    condition: selection
# Correlation metadata for value_sum
correlation:
    type: value_sum
    group-by:
        - SourceIP
        - User
    timespan: 1h
    condition:
        field: bytes_sent
        gt: 1000000
