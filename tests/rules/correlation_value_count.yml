title: Failed Login from Multiple User Accounts
id: 0e95725d-7320-415d-80f7-004da920fc12
description: Failed logon attempts with more than 100 different user accounts per source and destination in a day
status: test
author: Sigma Correlation Test
date: 2025-12-03
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID:
            - 4625
            - 529
        Status: 'Failed'
    condition: selection
# Correlation metadata for value_count
correlation:
    type: value_count
    group-by:
        - ComputerName
        - WorkstationName
    timespan: 1d
    condition:
        field: User
        gte: 100
