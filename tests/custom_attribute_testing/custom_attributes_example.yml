title: Example Rule with Custom Attributes for OpenSearch PPL Backend
id: 12345678-1234-1234-1234-123456789012
status: experimental
description: |
  This example demonstrates how to use custom attributes to configure
  the OpenSearch PPL backend behavior directly in the Sigma rule YAML.
  
  Custom attributes allow you to override backend options on a per-rule basis,
  providing fine-grained control without modifying the backend code or CLI options.
author: Your Name
date: 2024/01/01
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    CommandLine|contains: 'malicious.exe'
  condition: selection
falsepositives:
  - Unknown
level: high

# Custom attributes for OpenSearch PPL backend
custom:
  # Override the index pattern for this specific rule
  # If not specified, the backend will determine it from logsource
  opensearch_ppl_index: "custom-windows-logs-*"
  
  # Override the timestamp field name
  # Default is '@timestamp'
  opensearch_ppl_time_field: "event.created"
  
  # Set a minimum time filter for this rule
  # Supports relative time like "-7d", "-30d", "-1h"
  opensearch_ppl_min_time: "-30d"
  
  # Set a maximum time filter for this rule
  # Supports "now" or absolute timestamps like "2024-12-31T23:59:59"
  opensearch_ppl_max_time: "now"
