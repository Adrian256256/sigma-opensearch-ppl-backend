# =========================================================================
# USER FIELDS - User information relevant to the event
# =========================================================================
- id: user_field_mapping
  type: field_name_mapping
  mapping:
    # User name (subject user - the user performing the action)
    User: user.name
    UserName: user.name
    SubjectUserName: user.name
    AccountName: user.name
    
    # Target user (the user being acted upon)
    TargetUserName: user.target.name
    
    # User domain (subject)
    SubjectDomainName: user.domain
    UserDomain: user.domain
    Domain: user.domain
    
    # Target user domain
    TargetDomainName: user.target.domain
    
    # User ID/SID (subject)
    SubjectUserSid: user.id
    UserSid: user.id
    
    # Target user ID/SID
    TargetUserSid: user.target.id
    
    # Logon ID (stored in winlog for Windows-specific context)
    SubjectLogonId: winlog.event_data.SubjectLogonId
    TargetLogonId: winlog.event_data.TargetLogonId
    LogonId: winlog.event_data.LogonId
