# =========================================================================
# CERTIFICATE FIELDS - Certificate and code signing information
# =========================================================================
- id: certificate_field_mapping
  type: field_name_mapping
  mapping:
    # Certificate subject
    Subject: file.code_signature.subject_name
    
    # Certificate issuer
    Issuer: file.code_signature.issuer
    
    # Certificate serial number
    SerialNumber: file.x509.serial_number
    
    # Certificate thumbprint
    Thumbprint: file.hash.sha1
