# =========================================================================
# CREATE REMOTE THREAD FIELDS - Remote thread creation (Sysmon EID 8)
# =========================================================================
- id: create_remote_thread_field_mapping
  type: field_name_mapping
  mapping:
    # Source process (creating the thread)
    SourceImage: process.executable
    SourceProcessId: process.pid
    SourceProcessGuid: process.entity_id
    
    # Target process (receiving the thread)
    TargetImage: process.target.executable
    TargetProcessId: process.target.pid
    TargetProcessGuid: process.target.entity_id
    
    # Thread details
    StartAddress: winlog.event_data.StartAddress
    StartFunction: winlog.event_data.StartFunction
    StartModule: winlog.event_data.StartModule
